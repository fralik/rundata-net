name: NPM Test Template

on:
  workflow_call:

jobs:
  npm-test:
    name: NPM Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run npm tests
        run: npm test
